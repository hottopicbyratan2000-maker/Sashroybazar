<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sashroy Bazar</title>
    
    <style>
        /* html এবং body এর সাইজ স্ক্রিনের একদম সমান করে দেওয়া হলো */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* বাইরের স্ক্রলবার পুরোপুরি বন্ধ */
            background-color: #0f172a; /* ব্যাকগ্রাউন্ড কালার */
        }
        
        /* iframe কে চারপাশ থেকে টেনে স্ক্রিনের সমান করা হলো */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

        src="https://script.google.com/macros/s/AKfycbzpVZkmCvuE2gNsjUlxlV6Rb-lXJmVax9y5NmizRvsPk6EG5XvEKbNa56LCh11to3nj/exec" 
        allowfullscreen="true">

</body>
</html>
